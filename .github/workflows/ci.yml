name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        shell: bash
        run: set -o pipefail; npm test 2>&1 | tee test.log
      - name: Lint
        shell: bash
        run: set -o pipefail; npm run lint 2>&1 | tee lint.log
      - name: Build
        shell: bash
        run: set -o pipefail; npm run build 2>&1 | tee build.log
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verification-diagnostics
          path: |
            test.log
            lint.log
            build.log
          if-no-files-found: ignore
          retention-days: 3
